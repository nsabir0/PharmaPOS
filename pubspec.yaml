name: pharma_pos
description: "A professional Smart Pharmacy POS (SaaS) built with Flutter, BLoC, and Dart Frog."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  equatable: ^2.0.8
  
  # Dependency Injection
  get_it: ^9.2.1
  
  # Networking & Data
  dio: ^5.9.2
  fpdart: ^1.2.0
  json_annotation: ^4.11.0
  
  # UI & Utilities
  google_fonts: ^8.0.2
  intl: ^0.20.2
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.5
  go_router: ^17.2.1
  uuid: ^4.5.3
  logger: ^2.7.0
  motion_toast: ^2.15.0

  # Database & Local Persistence
  drift: ^2.32.1
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  json_serializable: ^6.13.1
  freezed: ^3.2.5
  freezed_annotation: ^3.1.0
  drift_dev: ^2.20.2
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  windows:
    generate: true
    image_path: "assets/icons/pharmapos_icon.ico"
    icon_size: 48
  image_path: "assets/icons/pharmapos_icon.ico"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
